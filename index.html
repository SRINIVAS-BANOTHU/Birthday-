<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhi ❤️ Sri</title>

<style>
body { margin:0; background:black; font-family:monospace; overflow:hidden; color:white; }

#lock {
  position:fixed; width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
  flex-direction:column; background:black;
}

input { padding:10px; border-radius:10px; border:none; }
button { padding:10px 20px; margin-top:10px; border-radius:20px; border:none; background:#00ffcc; }

#chat { display:none; padding:10px; height:100vh; overflow-y:auto; }

.msg { padding:10px; margin:8px; border-radius:10px; max-width:70%; }
.me { background:#00ffcc; color:black; margin-left:auto; }

canvas { position:fixed; top:0; left:0; }

.heart {
  position:fixed; color:red;
  animation:fall 5s linear infinite;
}

@keyframes fall {
  0% { top:-10px; }
  100% { top:100%; }
}
</style>
</head>

<body>

<div id="lock">
  <h2>🔐 Enter Name to Unlock</h2>
  <input id="nameInput" placeholder="Hint 😉">
  <button onclick="unlock()">Unlock ❤️</button>
</div>

<div id="chat"></div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<canvas id="canvas"></canvas>

<script>
// Unlock
function unlock() {
  let name = document.getElementById("nameInput").value.toLowerCase();
  if (name === "abhi") {
    document.getElementById("lock").style.display = "none";
    document.getElementById("chat").style.display = "block";
    document.getElementById("music").play();
    startChat();
    startHearts();
  } else {
    alert("Wrong 😜");
  }
}

// Chat
const messages = [
"Hey Abhi ❤️",
"Guess what 😏",
"It's your Birthday 🎂🔥",
"You = root access 💻",
"Without you = 404 ❌",
"Love you ♾️",
"Happy Birthday ❤️",
"- Sri 💖"
];

let i = 0;
function startChat() {
  let chat = document.getElementById("chat");
  function show() {
    if (i < messages.length) {
      let div = document.createElement("div");
      div.className = "msg me";
      div.innerText = messages[i];
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      i++;
      setTimeout(show, 1000);
    }
  }
  show();
}

// Fireworks
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x,y){
  for(let i=0;i<60;i++){
    particles.push({
      x,y,
      dx:(Math.random()-0.5)*6,
      dy:(Math.random()-0.5)*6,
      life:100
    });
  }
}

setInterval(()=>{
  createFirework(Math.random()*canvas.width, Math.random()*canvas.height/2);
},1500);

canvas.addEventListener("click",(e)=>{
  createFirework(e.clientX,e.clientY);
});

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
    ctx.fillRect(p.x,p.y,3,3);
    p.x+=p.dx; p.y+=p.dy; p.life--;
    if(p.life<=0) particles.splice(i,1);
  });

  requestAnimationFrame(draw);
}
draw();

// Hearts
function startHearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.style.left=Math.random()*100+"%";
    h.innerText="❤️";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },300);
}
</script>

</body>
</html>
